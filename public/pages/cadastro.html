<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/assets/css/main.css" />
    <title>DSM | Cadastro</title>
  </head>
  <body>
<main class="card">
        <h1 class="title">Cadastro</h1>
        <form class="auth-form" action="#" method="POST">
            <label for="email">E-mail</label>
            <input type="email"  id="email" required />
            
            <label for="senha">Senha</label>
            <input type="password"  id="senha" required/>

            <label for="confirmacao">Confirmação de senha</label>
            <input type="password"  id="confirmacao" required/>
            

        <div class="actions">
        <button class="btn-link">cadastrar</button>
        <a class="btn-link" href="./login">Ir para login</a>
        <a class="btn-link btn-secondary" href="/">Voltar</a>
    </div>

</main>
    </body>
</html>
